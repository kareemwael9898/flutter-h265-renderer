name: Build Windows Application (with FFmpeg)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Download and Package FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Write-Host "Downloading FFmpeg binary from BtbN..."
          curl.exe -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
          Write-Host "Copying ffmpeg.exe to bin/"
          Copy-Item -Path ffmpeg_temp\*\bin\ffmpeg.exe -Destination bin\ffmpeg.exe
          Write-Host "Cleaning up temporary files..."
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg_temp
          Write-Host "FFmpeg binary is ready in bin/:"
          Get-ChildItem -Path bin

      - name: Build Windows App
        run: flutter build windows --release

      - name: Upload Windows Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-build-with-ffmpeg
          path: build/windows/x64/runner/Release/

      - name: Compress Build Artifacts
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-release-with-ffmpeg.zip

      - name: Create Public Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: release-ffmpeg-${{ github.run_number }}
          name: Release with FFmpeg ${{ github.run_number }}
          files: windows-release-with-ffmpeg.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
